name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  cli-rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Format check
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Build
        run: cargo build --release
      - name: Test
        run: cargo test

  action-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install --quiet ruff mypy
          pip install --quiet -r action/requirements.txt
          pip install --quiet -r action/scripts/requirements.txt
      - name: Lint (ruff)
        run: ruff check action/scripts scripts
      - name: Type check (mypy)
        run: mypy --ignore-missing-imports action/scripts scripts
        continue-on-error: true  # non-blocking until fully typed

  android-sdk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Build
        run: ./gradlew build --no-daemon

  edge-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Type check Edge Functions
        run: |
          for fn in backend/supabase/functions/*/index.ts; do
            deno check "$fn"
          done