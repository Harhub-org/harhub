name: Harhub Build

on:
  workflow_dispatch:
    inputs:
      app_slug:
        description: "App slug — must have a matching entry in config/tracked-repos.toml. Build command/output comes from config/commands.toml if present, otherwise auto-detected."
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Harhub
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: harhub

      - name: Resolve repo from config/tracked-repos.toml
        id: resolve
        working-directory: harhub
        run: |
          REPO_URL=$(python3 -c "
          import tomllib
          with open('config/tracked-repos.toml', 'rb') as f:
              data = tomllib.load(f)
          match = next((r['url'] for r in data.get('repos', []) if r['app_slug'] == '${{ inputs.app_slug }}'), '')
          print(match)
          ")
          if [ -z "$REPO_URL" ]; then
            echo "::error::app_slug '${{ inputs.app_slug }}' has no matching entry in config/tracked-repos.toml — add one before running this workflow."
            exit 1
          fi
          echo "repo=$REPO_URL" >> "$GITHUB_OUTPUT"

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.resolve.outputs.repo }}
          path: target-repo
          fetch-depth: 1

      - name: Set up JDK 17 (for Gradle projects)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up build tools (Make, CMake, build-essential)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential cmake ninja-build

      - name: Set up Rust (for Cargo projects)
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js (for npm/electron-builder projects)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Harhub script dependencies
        working-directory: harhub
        run: pip install --quiet -r scripts/requirements.txt

      - name: Run Harhub build + publish
        working-directory: harhub
        env:
          GITHUB_TOKEN: ${{ secrets.HARHUB_READ_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TARGET_APP_SLUG: ${{ inputs.app_slug }}
          TARGET_REPO_DIR: ${{ github.workspace }}/target-repo
        run: python scripts/build_from_source.py