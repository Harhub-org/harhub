name: Harhub Sync

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      app_slug:
        description: "Optional: sync a single app_slug immediately instead of the full list"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet -r scripts/requirements.txt

      - name: Sync tracked repos
        env:
          GITHUB_TOKEN: ${{ secrets.HARHUB_READ_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HARHUB_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNC_SINGLE_APP_SLUG: ${{ inputs.app_slug }}
        run: python scripts/sync_tracked_repos.py