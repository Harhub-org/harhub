name: Harhub Sync

on:
  schedule:
    - cron: "*/15 * * * *"   # poll every 15 minutes for new releases
  workflow_dispatch:
    inputs:
      repo:
        description: "Optional: sync a single 'owner/repo' immediately instead of the full list"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for git worktree branch creation

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet -r scripts/requirements.txt

      - name: Sync tracked repos
        env:
          GITHUB_TOKEN: ${{ secrets.HARHUB_READ_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SYNC_SINGLE_REPO: ${{ inputs.repo }}
        run: python scripts/sync_tracked_repos.py