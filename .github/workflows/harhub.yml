name: Harhub Publish

on:
  workflow_dispatch:
    inputs:
      app_slug:
        description: "App slug — must have a matching entry in config/tracked-repos.toml"
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet -r scripts/requirements.txt

      - name: Publish target repo's latest release
        env:
          GITHUB_TOKEN: ${{ secrets.HARHUB_READ_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TARGET_APP_SLUG: ${{ inputs.app_slug }}
          HARHUB_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python action/scripts/publish_from_release.py