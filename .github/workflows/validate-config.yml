name: Validate Config

on:
  pull_request:
    paths:
      - "config/**"
  push:
    branches: [main]
    paths:
      - "config/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet -r scripts/requirements.txt

      - name: Validate commands.toml references
        run: python scripts/utils/build_config.py