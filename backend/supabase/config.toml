project_id = "harhub"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://harhub.dev"
additional_redirect_urls = ["https://harhub.dev/auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = true

[storage]
enabled = true
file_size_limit = "500MiB"

[edge_runtime]
enabled = true
policy = "oneshot"

[functions.sign-download]
verify_jwt = false

[functions.publish-release]
verify_jwt = false